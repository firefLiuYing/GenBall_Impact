<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Vis.js 测试</title>
<script src="https://cdn.bootcdn.net/ajax/libs/vis/4.21.0/vis.min.js"></script>
</head>
<body>
<h2>Vis.js 加载测试</h2>
<div id="network" style="width:600px;height:400px;border:1px solid #ccc"></div>
<script>
if (typeof vis !== 'undefined') {
  var nodes = new vis.DataSet([
    {id: 1, label: '节点 A', color: '#4e79a7'},
    {id: 2, label: '节点 B', color: '#f28e2b'},
    {id: 3, label: '节点 C', color: '#e15759'},
  ]);
  var edges = new vis.DataSet([
    {from: 1, to: 2, label: '调用'},
    {from: 2, to: 3, label: '依赖'},
  ]);
  new vis.Network(document.getElementById('network'), {nodes:nodes, edges:edges}, {});
  document.write('<p style="color:green">vis.js 正常，能画图</p>');
} else {
  document.write('<p style="color:red">vis.js 加载失败 — CDN 被墙</p>');
}
</script>
</body>
</html>
